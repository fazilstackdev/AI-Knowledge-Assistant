<!DOCTYPE html>
{% load static %}
<html lang="en" dir="ltr">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>AI Knowledge Assistant - Upload PDF</title>
    <meta name="description" content="Intelligent knowledge management system with PDF file upload">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ======================================== */
        /* reset.css - Base Styles */
        /* ======================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', 'IRANSans', 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            direction: ltr;
        }

        /* ======================================== */
        /* Main Container - Glass Effect */
        /* ======================================== */
        .content {
            max-width: 550px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 2.5rem 2.5rem 3rem 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: all 0.4s ease;
        }

        .content:hover {
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            transform: translateY(-3px);
        }

        /* ======================================== */
        /* Page Title - Live Gradient */
        /* ======================================== */
        .content h1 {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            text-align: center;
            margin-bottom: 2rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
        }

        .content h1 i {
            -webkit-text-fill-color: initial;
            font-size: 2.2rem;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .content h1::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, #60a5fa, #a78bfa, #f472b6);
            border-radius: 2px;
        }

        /* ======================================== */
        /* Upload Form */
        /* ======================================== */
        .content form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        /* ======================================== */
        /* Form Fields */
        /* ======================================== */
        .content form p {
            margin: 0;
        }

        .content form label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            letter-spacing: 0.3px;
        }

        .content form label i {
            margin-right: 0.4rem;
            color: #60a5fa;
        }

        /* ======================================== */
        /* File Input - Modern Design */
        /* ======================================== */
        .content form input[type="file"] {
            width: 100%;
            padding: 1.2rem;
            background: rgba(255, 255, 255, 0.06);
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .content form input[type="file"]:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(96, 165, 250, 0.4);
        }

        .content form input[type="file"]:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.15);
        }

        /* ======================================== */
        /* File Select Button Styling */
        /* ======================================== */
        .content form input[type="file"]::file-selector-button {
            padding: 0.5rem 1.2rem;
            background: linear-gradient(135deg, rgba(96, 165, 250, 0.2), rgba(167, 139, 250, 0.2));
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-right: 1rem;
            font-family: inherit;
        }

        .content form input[type="file"]::file-selector-button:hover {
            background: linear-gradient(135deg, rgba(96, 165, 250, 0.4), rgba(167, 139, 250, 0.4));
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(96, 165, 250, 0.2);
        }

        /* ======================================== */
        /* Help Text */
        /* ======================================== */
        .content form .helptext {
            display: block;
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            font-style: italic;
        }

        .content form .helptext i {
            margin-right: 0.3rem;
            font-size: 0.7rem;
        }

        /* ======================================== */
        /* Errors */
        /* ======================================== */
        .content form .errorlist {
            list-style: none;
            padding: 0;
            margin: 0.5rem 0 0 0;
        }

        .content form .errorlist li {
            color: #f87171;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.3rem 0.8rem;
            background: rgba(248, 113, 113, 0.1);
            border-radius: 8px;
            border-left: 3px solid #f87171;
        }

        .content form .errorlist li::before {
            content: '⚠️';
            font-size: 0.8rem;
        }

        /* ======================================== */
        /* Upload Button - Gradient & Effects */
        /* ======================================== */
        .content form button[type="submit"] {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #a855f7);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.7rem;
            font-family: inherit;
            letter-spacing: 0.3px;
        }

        .content form button[type="submit"]::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: all 0.6s ease;
        }

        .content form button[type="submit"]:hover::before {
            left: 100%;
        }

        .content form button[type="submit"]:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 35px rgba(99, 102, 241, 0.4);
        }

        .content form button[type="submit"]:active {
            transform: translateY(0) scale(0.98);
        }

        .content form button[type="submit"] i {
            font-size: 1.1rem;
        }

        /* ======================================== */
        /* Success/Error Messages */
        /* ======================================== */
        .messages {
            margin-bottom: 1.5rem;
        }

        .message {
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            animation: slideDown 0.3s ease;
        }

        .message.success {
            background: rgba(52, 211, 153, 0.15);
            color: #6ee7b7;
            border: 1px solid rgba(52, 211, 153, 0.2);
        }

        .message.error {
            background: rgba(248, 113, 113, 0.15);
            color: #fca5a5;
            border: 1px solid rgba(248, 113, 113, 0.2);
        }

        .message.info {
            background: rgba(96, 165, 250, 0.15);
            color: #93c5fd;
            border: 1px solid rgba(96, 165, 250, 0.2);
        }

        /* ======================================== */
        /* Animations */
        /* ======================================== */
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .content h1 i {
            animation: pulse 3s infinite;
        }

        /* ======================================== */
        /* Footer Note */
        /* ======================================== */
        .footer-note {
            text-align: center;
            margin-top: 1.5rem;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.7rem;
            letter-spacing: 1px;
        }

        .footer-note i {
            margin: 0 0.3rem;
        }

        /* ======================================== */
        /* Responsive */
        /* ======================================== */
        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }
            
            .content {
                padding: 1.8rem 1.2rem 2.2rem 1.2rem;
                border-radius: 24px;
            }
            
            .content h1 {
                font-size: 1.5rem;
            }
            
            .content h1 i {
                font-size: 1.6rem;
            }
            
            .content form input[type="file"] {
                padding: 0.8rem;
                font-size: 0.8rem;
            }
            
            .content form input[type="file"]::file-selector-button {
                padding: 0.3rem 0.8rem;
                font-size: 0.75rem;
                margin-right: 0.5rem;
            }
            
            .content form button[type="submit"] {
                padding: 0.7rem 1.5rem;
                font-size: 0.9rem;
            }
        }

        /* ======================================== */
        /* Custom Scrollbar */
        /* ======================================== */
        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #6366f1, #a855f7);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #8b5cf6, #d946ef);
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>
            <i class="fas fa-robot"></i>
            Upload PDF
        </h1>
        
        <!-- Display Messages -->
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="message {{ message.tags }}">
                <i class="fas {% if message.tags == 'success' %}fa-check-circle{% elif message.tags == 'error' %}fa-exclamation-circle{% else %}fa-info-circle{% endif %}"></i>
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">
                <i class="fas fa-cloud-upload-alt"></i>
                Upload File
            </button>
        </form>
        
        <div class="footer-note">
            <i class="fas fa-shield-alt"></i>
            PDF files up to 10 MB
            <i class="fas fa-circle" style="font-size: 0.2rem; vertical-align: middle;"></i>
            Persian language support
        </div>
    </div>
</body>
</html>
